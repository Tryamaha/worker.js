<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spam Kovucu PRO MAX AI</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1d4ed8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spam Kovucu">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Noto Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at top,#1d4ed8,#020617 45%,#01030a 100%);
  color:#fff;
}
.app{max-width:520px;margin:auto;padding:18px;}
h1{font-size:32px;margin-bottom:4px}
p{color:#cbd5e1}
.card{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.13);
  border-radius:26px;
  padding:20px;
  margin:14px 0;
  backdrop-filter:blur(18px);
}
input{
  width:100%;padding:16px;border:none;border-radius:18px;
  background:#020617;color:#fff;font-size:22px;box-sizing:border-box;
}
button{
  width:100%;padding:15px;margin-top:12px;border:none;border-radius:18px;
  font-size:17px;font-weight:800;color:white;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
}
.score{text-align:center;font-size:74px;font-weight:900}
.safe{color:#22c55e}.warn{color:#facc15}.danger{color:#ef4444}
.row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.10)}
.row:last-child{border-bottom:none}
.label{color:#94a3b8}
.value{text-align:right;font-weight:700}
.tag{
  display:inline-block;padding:8px 14px;margin:5px;border-radius:999px;
  background:rgba(255,255,255,.10);font-size:14px;
}
.loading{text-align:center;color:#93c5fd}
ul{padding-left:22px}
li{margin:8px 0;color:#e2e8f0}
.src{
  background:rgba(255,255,255,.08);
  padding:15px;
  border-radius:18px;
  margin:12px 0;
}
.src h3{margin:0 0 8px 0;font-size:17px}
.src p{margin:0 0 10px 0;font-size:14px;color:#cbd5e1}
a{color:#bfdbfe;text-decoration:none}
.toolbtn{
  width:48%;
  display:inline-block;
  text-align:center;
  padding:14px;
  margin-top:8px;
  border-radius:18px;
  background:rgba(255,255,255,.08);
  font-weight:800;
}
.aiBox{font-size:20px;line-height:1.5;color:#dbeafe}
.small{font-size:13px;color:#94a3b8}

@media print{
  body{
    background:#fff!important;
    color:#000!important;
    font-family:"Noto Sans",Arial,sans-serif!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .app{max-width:100%;padding:12px}
  .card{
    background:#fff!important;
    color:#000!important;
    border:1px solid #ddd!important;
    box-shadow:none!important;
    backdrop-filter:none!important;
    page-break-inside:avoid;
  }
  p,.label,.small,li{color:#111!important}
  .value,h1,h2,h3{color:#000!important}
  button,.toolbtn{display:none!important}
}
</style>
</head>

<body>
<div class="app">

<h1>🛡️ Spam Kovucu PRO MAX AI</h1>
<p>Yapay zekâ destekli açık kaynak spam/dolandırıcı numara dedektifi.</p>

<div class="card">
  <h2>📞 Numara Sorgula</h2>
  <input id="phone" placeholder="Örn: 03126242405">
  <button onclick="analyze()">FULL AI ULTRA ANALİZ</button>
</div>

<div id="out"></div>

</div>

<script>
const API = "https://spam-kovucu-api.tryamaneha.workers.dev";

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}

function riskClass(score){
  if(score>=75) return "danger";
  if(score>=45) return "warn";
  return "safe";
}

function fmtDate(x){
  if(!x) return "-";
  try{
    return new Date(x).toLocaleString("tr-TR");
  }catch(e){return "-";}
}

async function analyze(){
  const phone = document.getElementById("phone").value.trim();
  const out = document.getElementById("out");

  if(!phone){
    out.innerHTML=`<div class="card">Numara gir.</div>`;
    return;
  }

  out.innerHTML=`<div class="card loading">🧠 AI motorları çalışıyor... açık web taranıyor...</div>`;

  try{
    const res = await fetch(API+"?number="+encodeURIComponent(phone));
    const data = await res.json();

    const cls = riskClass(data.score||0);
    const safeWeb = data.webResults || [];
    const safeKeywords = data.keywords || [];
    const safeComplaints = data.complaints || [];
    const safeOsint = data.osint || [];

    out.innerHTML = `
    <div class="card">
      <h2 style="text-align:center">PRO Risk Skoru</h2>
      <div class="score ${cls}">${data.score}</div>
      <h2 class="${cls}" style="text-align:center">${data.risk} Risk</h2>
      <div style="text-align:center">
        <span class="tag">${data.operator}</span>
        <span class="tag">${data.city}</span>
        <span class="tag">${safeWeb.length} web sonucu</span>
        <span class="tag">${safeKeywords.length} risk kelimesi</span>
      </div>
    </div>

    <div class="card">
      <h2>🤖 AI Dedektif Yorumu</h2>
      <div class="aiBox">${data.aiComment || "-"}</div>
    </div>

    <div class="card">
      <h2>📄 Numara Kimliği</h2>
      <div class="row"><div class="label">Numara</div><div class="value">${data.number}</div></div>
      <div class="row"><div class="label">Normalize</div><div class="value">${data.normalized}</div></div>
      <div class="row"><div class="label">Hat</div><div class="value">${data.operator}</div></div>
      <div class="row"><div class="label">Şehir</div><div class="value">${data.city}</div></div>
      <div class="row"><div class="label">Sahip Tahmini</div><div class="value">${data.owner}</div></div>
      <div class="row"><div class="label">Firma Tahmini</div><div class="value">${data.company}</div></div>
      <div class="row"><div class="label">Son Analiz</div><div class="value">${fmtDate(data.updatedAt)}</div></div>
    </div>

    <div class="card">
      <h2>🚨 AI Şikayet Bulguları</h2>
      <ul>${safeComplaints.map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <h2>🧠 Risk Keyword Radar</h2>
      ${safeKeywords.length ? safeKeywords.map(x=>`<span class="tag">${x}</span>`).join("") : `<p class="small">Risk kelimesi yok</p>`}
    </div>

    <div class="card">
      <h2>🌐 OSINT İzleri</h2>
      <ul>${safeOsint.map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>

    <div class="card">
      <h2>📡 Canlı Web Kaynakları</h2>
      ${
        safeWeb.length
        ? safeWeb.map(w=>`
          <div class="src">
            <h3>${w.title}</h3>
            <p>${w.snippet}</p>
            <a href="${w.link}" target="_blank">Kaynağı aç →</a>
          </div>
        `).join("")
        : `<p>Web kaynağı bulunamadı.</p>`
      }
    </div>

    <div class="card">
      <h2>🛠️ Akıllı İşlemler</h2>
      <a class="toolbtn" href="javascript:navigator.clipboard.writeText('${data.number}')">Numarayı Kopyala</a>
      <a class="toolbtn" href="https://wa.me/?text=${encodeURIComponent('Spam Kovucu Raporu\n'+data.number+'\nRisk: '+data.risk+' ('+data.score+')\n'+data.aiComment)}" target="_blank">WhatsApp Paylaş</a>
      <a class="toolbtn" href="javascript:print()">Rapor Yazdır/PDF</a>
      <a class="toolbtn" href="javascript:complaint('${data.number}','${data.aiComment}')">BTK Şikayet Notu</a>
    </div>

    <div class="card">
      <h2>🛡️ Tavsiye</h2>
      <ul>
        <li>SMS kodu, TC kimlik, banka bilgisi ve adres paylaşma.</li>
        <li>“Evet / onaylıyorum” deme.</li>
        <li>Kurum adı veriyorsa kapatıp resmî numarayı ara.</li>
        <li>Yüksek riskte numarayı engelle.</li>
      </ul>
    </div>
    `;

  }catch(e){
    out.innerHTML=`<div class="card">❌ API bağlantı hatası</div>`;
  }
}

function complaint(no,comment){
  alert("BTK Şikayet Taslağı:\\n\\n"+no+" numarası tarafından sürekli/spam içerikli rahatsız edici aramalar almaktayım. Yapay zekâ destekli açık kaynak analizinde numara riskli değerlendirilmiştir. "+comment+" Gerekli incelemenin yapılmasını arz ederim.");
}
</script>
</body>
</html>
