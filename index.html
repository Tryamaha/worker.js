<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Spam Kovucu TITANIUM AI</title>
<style>
:root{
  --bg:#020617;--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.16);
  --txt:#fff;--muted:#a8b3cf;--blue:#60a5fa;--red:#ff4d4d;--yellow:#facc15;--green:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:radial-gradient(circle at top,#1e40af 0,#071028 38%,#020617 75%,#000);
  color:var(--txt);min-height:100vh;
}
.app{max-width:560px;margin:auto;padding:18px 18px 40px}
.hero{
  padding:22px 0 8px;
}
h1{font-size:34px;margin:0 0 6px;font-weight:900;letter-spacing:-.5px}
p{color:var(--muted);line-height:1.45}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:30px;
  padding:20px;margin:16px 0;backdrop-filter:blur(22px);
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}
input{
  width:100%;padding:18px;border:1px solid rgba(255,255,255,.1);
  border-radius:20px;background:#020617;color:white;font-size:24px;
}
button{
  width:100%;padding:16px;margin-top:12px;border:0;border-radius:20px;
  color:white;font-size:17px;font-weight:900;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ghost{background:rgba(255,255,255,.1)}
.score{
  font-size:92px;text-align:center;font-weight:1000;line-height:1;
  text-shadow:0 0 30px rgba(255,255,255,.15);
}
.safe{color:var(--green)}.warn{color:var(--yellow)}.danger{color:var(--red)}
.pulse{
  animation:pulse 1.6s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,77,77,0))}
  50%{transform:scale(1.035);filter:drop-shadow(0 0 22px rgba(255,77,77,.45))}
  100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,77,77,0))}
}
.alert{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.14)}
.row{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.row:last-child{border-bottom:0}
.label{color:var(--muted)}
.value{text-align:right;font-weight:800}
.tag{
  display:inline-block;padding:9px 14px;margin:5px;border-radius:999px;
  background:rgba(255,255,255,.12);font-size:14px;color:#eef2ff
}
.source{
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.08);
  padding:16px;border-radius:22px;margin:12px 0;
}
.source h3{margin:0 0 8px;font-size:18px}
.source p{font-size:14px;margin:0 0 10px}
a{color:#bfdbfe;text-decoration:none;font-weight:700}
ul{padding-left:22px}li{margin:9px 0;color:#e2e8f0}
.loading{text-align:center;padding:30px}
.ring{
  width:72px;height:72px;border-radius:50%;margin:10px auto 20px;
  border:6px solid rgba(255,255,255,.15);border-top-color:#60a5fa;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai{
  background:linear-gradient(135deg,rgba(96,165,250,.16),rgba(124,58,237,.18));
}
.history button{font-size:14px;padding:10px;margin:6px 6px 0 0;width:auto}
.small{font-size:13px;color:var(--muted)}
details summary{cursor:pointer;font-weight:900;font-size:22px}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>🧠 Spam Kovucu TITANIUM AI</h1>
    <p>Yapay zeka destekli açık web, şikayet, spam, tahsilat ve numara kümesi analiz motoru.</p>
  </div>

  <div class="card">
    <input id="phone" inputmode="tel" placeholder="Örn: 03126242405">
    <button onclick="run()">ULTRA AI TARAMA BAŞLAT</button>
    <div class="btnrow">
      <button class="ghost" onclick="pasteNum()">Yapıştır</button>
      <button class="ghost" onclick="clearAll()">Temizle</button>
    </div>
  </div>

  <div id="history" class="card history" style="display:none"></div>
  <div id="out"></div>
</div>

<script>
const API = "https://spam-kovucu-api.tryamaneha.workers.dev";

function cls(s){return s>=75?"danger":s>=45?"warn":"safe"}
function riskText(s){return s>=75?"Yüksek Risk":s>=45?"Orta Risk":s>=25?"Şüpheli":"Düşük Risk"}

function escapeHtml(x){
  return String(x ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

async function pasteNum(){
  try{
    const t = await navigator.clipboard.readText();
    document.getElementById("phone").value = t.replace(/[^\d+]/g,"");
  }catch(e){}
}

function clearAll(){
  document.getElementById("phone").value="";
  document.getElementById("out").innerHTML="";
}

function saveHistory(n){
  let h = JSON.parse(localStorage.getItem("spamHistory")||"[]");
  h = [n, ...h.filter(x=>x!==n)].slice(0,6);
  localStorage.setItem("spamHistory", JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h = JSON.parse(localStorage.getItem("spamHistory")||"[]");
  const box = document.getElementById("history");
  if(!h.length){box.style.display="none";return}
  box.style.display="block";
  box.innerHTML = "<h2>🕘 Son Sorgular</h2>" + h.map(n=>`<button class="ghost" onclick="quick('${n}')">${n}</button>`).join("");
}

function quick(n){
  document.getElementById("phone").value=n;
  run();
}

function printReport(){
  window.print();
}

async function run(){
  const n = document.getElementById("phone").value.trim();
  const out = document.getElementById("out");
  if(!n){out.innerHTML='<div class="card">Numara gir.</div>';return}

  saveHistory(n);
  out.innerHTML = `
    <div class="card loading">
      <div class="ring"></div>
      <h2>AI motorları açık webi tarıyor...</h2>
      <p>Şikayet, spam, tahsilat, sessiz çağrı ve benzer numara kümeleri analiz ediliyor.</p>
    </div>`;

  try{
    const r = await fetch(API+"?number="+encodeURIComponent(n));
    const d = await r.json();
    const score = Number(d.score || 0);
    const color = cls(score);
    const dateText = d.lastAnalysis || d.updatedAt ? new Date(d.lastAnalysis || d.updatedAt).toLocaleString("tr-TR") : "-";
    const web = d.webResults || [];
    const keywords = d.keywords || [];

    out.innerHTML = `
      <div class="card ${score>=75?'alert':''}">
        <h2 style="text-align:center">PRO Risk Skoru</h2>
        <div class="score ${color} ${score>=75?'pulse':''}">${score}</div>
        <h2 class="${color}" style="text-align:center">${escapeHtml(d.risk || riskText(score))}</h2>
        <div style="text-align:center">
          <span class="tag">${escapeHtml(d.operator)}</span>
          <span class="tag">${escapeHtml(d.city)}</span>
          <span class="tag">${web.length} web sonucu</span>
          <span class="tag">${keywords.length} risk kelimesi</span>
        </div>
      </div>

      <div class="card ai">
        <h2>🤖 AI Dedektif Yorumu</h2>
        <p>${escapeHtml(d.aiComment || "AI yorumu üretilemedi.")}</p>
      </div>

      <div class="card">
        <h2>📄 Numara Kimliği</h2>
        ${row("Numara", d.number)}
        ${row("Normalize", d.normalized)}
        ${row("Hat", d.operator)}
        ${row("Şehir", d.city)}
        ${row("Sahip Tahmini", d.owner)}
        ${row("Firma Tahmini", d.company)}
        ${row("Son Analiz", dateText)}
      </div>

      <div class="card">
        <h2>🚨 AI Şikayet Bulguları</h2>
        <ul>${(d.complaints||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <h2>🧠 Risk Keyword Radar</h2>
        ${keywords.length ? keywords.map(x=>`<span class="tag">${escapeHtml(x)}</span>`).join("") : "<p>Risk kelimesi bulunmadı.</p>"}
      </div>

      <div class="card">
        <h2>🌐 OSINT İzleri</h2>
        <ul>${(d.osint||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <details open>
          <summary>📡 Canlı Web Kaynakları</summary>
          ${web.length ? web.map(x=>`
            <div class="source">
              <h3>${escapeHtml(x.title)}</h3>
              <p>${escapeHtml(x.snippet)}</p>
              ${x.link && x.link !== "#" ? `<a target="_blank" href="${x.link}">Kaynağı aç →</a>` : ""}
            </div>`).join("") : "<p>Web kaynağı bulunamadı.</p>"}
        </details>
      </div>

      <div class="card">
        <h2>🛡️ Tavsiye</h2>
        <ul>
          <li>SMS kodu, TC kimlik, banka bilgisi ve adres paylaşma.</li>
          <li>“Evet / onaylıyorum” deme.</li>
          <li>Kurum adı veriyorsa kapatıp resmî numarayı ara.</li>
          <li>Yüksek riskte numarayı engelle.</li>
        </ul>
        <div class="btnrow">
          <button class="ghost" onclick="navigator.clipboard.writeText('${escapeHtml(d.normalized || n)}')">Numarayı Kopyala</button>
          <button class="ghost" onclick="printReport()">Rapor Yazdır/PDF</button>
        </div>
      </div>
    `;
  }catch(e){
    out.innerHTML='<div class="card alert">❌ API bağlantısı kurulamadı.</div>';
  }
}

function row(a,b){
  return `<div class="row"><div class="label">${escapeHtml(a)}</div><div class="value">${escapeHtml(b || "-")}</div></div>`;
}

renderHistory();
</script>
</body>
</html>
