<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Spam Kovucu Ultra Max</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#020617;
color:#fff;
padding:22px;
}
h1{
font-size:56px;
margin-bottom:25px;
font-weight:800;
}
.card{
background:#111827;
border:1px solid rgba(255,255,255,.12);
border-radius:28px;
padding:22px;
margin-bottom:22px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}
input{
width:100%;
padding:22px;
font-size:34px;
border:none;
outline:none;
border-radius:22px;
background:#020617;
color:white;
box-sizing:border-box;
margin-bottom:20px;
}
button{
width:100%;
padding:22px;
font-size:34px;
font-weight:700;
border:none;
border-radius:22px;
background:#2563eb;
color:white;
}
.big{
font-size:58px;
font-weight:800;
margin-bottom:10px;
}
.line{
font-size:28px;
margin:14px 0;
line-height:1.4;
}
.smallbtn{
margin-top:15px;
}
a{
color:#60a5fa;
}
</style>
</head>
<body>

<h1>🛡️ Spam Kovucu Ultra Max</h1>

<div class="card">
<input id="phone" placeholder="Numara gir">
<button onclick="tara()">Tara</button>
</div>

<div id="result"></div>

<div class="card">
<button class="smallbtn" onclick="location.href='https://spam-kovucu-api.tryamaneha.workers.dev/dashboard'">📊 Dashboard</button>
</div>

<script>
const API="https://spam-kovucu-api.tryamaneha.workers.dev";

async function tara(){
let no=document.getElementById("phone").value.trim();
if(!no) return;

document.getElementById("result").innerHTML='<div class="card"><div class="big">Taranıyor...</div></div>';

let r=await fetch(API+"/analyze?phone="+encodeURIComponent(no));
let d=await r.json();

document.getElementById("result").innerHTML=`
<div class="card">
<div class="big">${d.risk}</div>
<div class="line">Skor: ${d.score}</div>
<div class="line">Hafıza: ${d.memoryHits} kayıt</div>
<div class="line">İhbar: ${d.reportCount}</div>
<div class="line">Kara Liste: ${d.blacklist ? "EVET" : "HAYIR"}</div>
<div class="line">${d.aiComment}</div>
</div>

<div class="card">
<button onclick="ihbar('${no}')">🚨 Spam İhbar Et</button>
</div>

<div class="card">
<button onclick="kara('${no}')">⛔ Kara Listeye Al</button>
</div>
`;
}

async function ihbar(no){
await fetch(API+"/report",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
phone:no,
type:"spam",
note:"Safari kullanıcı ihbarı"
})
});
alert("İhbar kaydedildi");
tara();
}

async function kara(no){
await fetch(API+"/blacklist",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
phone:no,
reason:"Safari manuel kara liste"
})
});
alert("Kara listeye alındı");
tara();
}
</script>

</body>
</html>
