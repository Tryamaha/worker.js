<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spam Kovucu TITANIUM AI</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
background:radial-gradient(circle at top,#1d4ed8,#020617 45%,#000);
color:white;
}
.app{max-width:560px;margin:auto;padding:18px}
h1{font-size:34px;margin-bottom:4px}
p{color:#cbd5e1}
.card{
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.14);
border-radius:28px;
padding:20px;
margin:16px 0;
backdrop-filter:blur(18px);
box-shadow:0 0 35px rgba(0,0,0,.35);
}
input{
width:100%;
padding:17px;
font-size:23px;
border:none;
border-radius:18px;
background:#020617;
color:white;
box-sizing:border-box;
}
button{
width:100%;
padding:16px;
margin-top:12px;
font-size:18px;
font-weight:800;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}
.score{
font-size:82px;
font-weight:900;
text-align:center;
}
.safe{color:#22c55e}
.warn{color:#facc15}
.danger{color:#ef4444}
.row{
display:flex;
justify-content:space-between;
gap:12px;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}
.row:last-child{border-bottom:none}
.label{color:#94a3b8}
.value{text-align:right;font-weight:700}
.tag{
display:inline-block;
padding:9px 14px;
margin:5px;
border-radius:999px;
background:rgba(255,255,255,.1);
font-size:14px;
}
.source{
background:rgba(255,255,255,.08);
padding:16px;
border-radius:20px;
margin:12px 0;
}
.source h3{margin:0 0 8px 0;font-size:17px}
.source p{font-size:14px;color:#cbd5e1}
.loading{text-align:center;color:#93c5fd}
</style>
</head>
<body>
<div class="app">
<h1>🧠 Spam Kovucu TITANIUM AI</h1>
<p>Yapay zeka destekli açık web + spam + şikayet + küme analizi</p>

<div class="card">
<input id="phone" placeholder="Örn: 03126242405">
<button onclick="run()">ULTRA AI TARAMA BAŞLAT</button>
</div>

<div id="out"></div>
</div>

<script>
const API="https://spam-kovucu-api.tryamaneha.workers.dev";

function rc(s){
if(s>=75)return"danger";
if(s>=45)return"warn";
return"safe";
}

async function run(){
const n=document.getElementById("phone").value.trim();
const out=document.getElementById("out");
if(!n){out.innerHTML='<div class="card">Numara gir.</div>';return;}

out.innerHTML='<div class="card loading">🧠 AI motorları açık web tarıyor...</div>';

const r=await fetch(API+"?number="+encodeURIComponent(n));
const d=await r.json();

let webCards="";
(d.webResults||[]).forEach(x=>{
webCards+=`
<div class="source">
<h3>${x.title}</h3>
<p>${x.snippet}</p>
</div>`;
});

out.innerHTML=`
<div class="card">
<div class="score ${rc(d.score)}">${d.score}</div>
<h2 class="${rc(d.score)}" style="text-align:center">${d.risk} Risk</h2>
<div style="text-align:center">${d.aiComment}</div>
</div>

<div class="card">
<h2>📄 Numara Kimliği</h2>
<div class="row"><div class="label">Numara</div><div class="value">${d.number}</div></div>
<div class="row"><div class="label">Hat</div><div class="value">${d.operator}</div></div>
<div class="row"><div class="label">Şehir</div><div class="value">${d.city}</div></div>
<div class="row"><div class="label">Sahip</div><div class="value">${d.owner}</div></div>
<div class="row"><div class="label">Firma</div><div class="value">${d.company}</div></div>
</div>

<div class="card">
<h2>🚨 AI Şikayet Bulguları</h2>
<ul>${d.complaints.map(x=>"<li>"+x+"</li>").join("")}</ul>
</div>

<div class="card">
<h2>🧠 Risk Keyword Radar</h2>
${d.keywords.map(x=>'<span class="tag">'+x+'</span>').join("")}
</div>

<div class="card">
<h2>🌐 OSINT İzleri</h2>
<ul>${d.osint.map(x=>"<li>"+x+"</li>").join("")}</ul>
</div>

<div class="card">
<h2>📡 Canlı Web Kaynakları</h2>
${webCards}
</div>
`;
}
</script>
</body>
</html>
